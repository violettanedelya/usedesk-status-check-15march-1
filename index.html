<style>
*{margin:0;padding:0;box-sizing:border-box}
body{min-height:100vh;display:flex;align-items:center;justify-content:center;background:#f0f2f5;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif}
.card{background:#fff;border-radius:16px;padding:40px;box-shadow:0 2px 16px rgba(0,0,0,.08);text-align:center;max-width:380px;width:90%}

button{width:100%;padding:12px;margin-top:12px;background:#4a90d9;color:#fff;border:none;border-radius:8px;font-size:16px;cursor:pointer;transition:background .2s}
button:hover{background:#357abd}
.error{color:#e74c3c;font-size:14px;margin-top:12px;display:none}
</style>

function b64d(s){return Uint8Array.from(atob(s),c=>c.charCodeAt(0))}
async function decrypt(){
  const pwd=document.getElementById("pwd").value;
  const enc=new TextEncoder();
  const km=await crypto.subtle.importKey("raw",enc.encode(pwd),"PBKDF2",false,["deriveBits","deriveKey"]);
  const key=await crypto.subtle.deriveKey({name:"PBKDF2",salt:b64d(SALT),iterations:100000,hash:"SHA-256"},km,{name:"AES-GCM",length:256},false,["decrypt"]);
  try{
    const dec=await crypto.subtle.decrypt({name:"AES-GCM",iv:b64d(IV)},key,b64d(CT));
    const html=new TextDecoder().decode(dec);
    document.open();document.write(html);document.close();
  }catch(e){
    document.getElementById("err").style.display="block";
  }
}
